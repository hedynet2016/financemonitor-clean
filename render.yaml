services:
  - type: web
    name: workbuddy
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_EVENTS_WEBHOOK_URL
        sync: false
      - key: GMAIL_SENDER
        value: hedynet2016@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: REPORT_RECIPIENT
        value: admin@hedynet.com
      - key: GITHUB_PAT
        sync: false
      - key: GITHUB_USER
        value: "hedynet2016"
      - key: GITHUB_REPO_BACKUP
        value: "workbuddy-backup"
      - key: TZ
        value: Asia/Taipei
      - key: PYTHONUNBUFFERED
        value: "1"
